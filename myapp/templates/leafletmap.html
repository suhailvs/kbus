<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Center Radius Picker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body, #map { height: 100%; margin: 0; padding: 0; }
  #coords {position: absolute; top: 10px; left: 50%; background: #fff; z-index: 1000;}
</style>
</head>
<body>
<div id="coords">Lat: --, Lng: --</div>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const initialCenter = [10.59975, 76.45969];
  const radiusMeters = 1000;
  const map = L.map('map', { zoomControl: true }).setView(initialCenter, 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  const circle = L.circle(map.getCenter(), {
    radius: radiusMeters,
    color: '#2E7D44',
    fillColor: '#2E7D44',
    fillOpacity: 0.15,
    weight: 2
  }).addTo(map);
  const coordsEl = document.getElementById('coords');
  function updateCenter() {
    const center = map.getCenter();
    circle.setLatLng(center);
    coordsEl.textContent = `Lat: ${center.lat.toFixed(6)}, Lng: ${center.lng.toFixed(6)}`;
  }
  map.on('moveend', updateCenter); // fires once movement settles (final value)
</script>

</body>
</html>
