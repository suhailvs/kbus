{% extends "base.html" %}

{% block css %}
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Map wrapper — relative so overlays can be absolute inside */
    #map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .bus-label {
      position: absolute;
      background: #00b4d8;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 2px 4px;
      border-radius: 4px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,.28);
      pointer-events: auto;
      cursor: pointer;
    }
    /* ── Coords panel at bottom ── */
    #coords-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
    }
  </style>
{% endblock %}
{% block content %}
<div id="map-wrapper">
    <div id="map"></div>
    <!-- Coords readout -->
    <div id="coords-panel">
      Lat: <span id="lat-val">—</span> &nbsp; Lng: <span id="lng-val">—</span>
    </div>
  </div>
{% endblock %}
{% block js %}
<script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBwFTs8_ByftQEytonOPdVpdV9N0uyi3h4&callback=initMap&v=weekly"
    async defer>
  </script>
 <script>
    const INIT_CENTER = { lat: 10.59975, lng: 76.45969 };
    let map, circle, labelOverlays = [];
    function updateCoords(latLng) {
      document.getElementById('lat-val').textContent = latLng.lat().toFixed(6);
      document.getElementById('lng-val').textContent = latLng.lng().toFixed(6);
    }
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: INIT_CENTER,
        zoom: 14,
        disableDefaultUI: false,
        zoomControl: true,
        streetViewControl: false,
        mapTypeControl: false,
        fullscreenControl: false,
        gestureHandling: 'greedy',
        styles: [
          { featureType: 'water',     elementType: 'geometry.fill',   stylers: [{ color: '#a8d4f5' }] },
          { featureType: 'landscape', elementType: 'geometry.fill',   stylers: [{ color: '#e8edf0' }] },
          { featureType: 'road',      elementType: 'geometry.fill',   stylers: [{ color: '#ffffff' }] },
          { featureType: 'road',      elementType: 'geometry.stroke', stylers: [{ color: '#d0d0d0' }] },
          { featureType: 'poi',       elementType: 'labels',          stylers: [{ visibility: 'off' }] }
        ]
      });
      circle = new google.maps.Circle({
        map,
        center: INIT_CENTER,
        radius: 1000,
        strokeColor: '#888888',
        strokeOpacity: 0.7,
        strokeWeight: 1.5,
        fillColor: '#aaaaaa',
        fillOpacity: 0.18,
        clickable: false,
      });

      // Bus route label overlay
      class BusLabel extends google.maps.OverlayView {
        constructor(pos, text) { super(); this.pos = pos; this.text = text; this.div = null; }
        onAdd() {
          this.div = $('<div>', {class: 'bus-label',text: `🚌 ${this.text}`})
          .click(() => location.href = `details.html?bus=${encodeURIComponent(this.text)}`);
          $(this.getPanes().floatPane).append(this.div);
        }
        draw() {
          const p = this.getProjection().fromLatLngToDivPixel(this.pos);
          if (p && this.div) {
            this.div.css({left: p.x - this.div.outerWidth() / 2,top: p.y - 40});
          }
        }
        setPosition(latLng) { this.pos = latLng; this.draw(); }
        onRemove() {this.div?.remove();this.div = null;}
      }

      function refreshLabel() {
        labelOverlays.forEach(o => o.setMap(null));
        labelOverlays = [];
        const buses = [{name:"Palakkad-Pathanamthitta",lat:"10.59975",log:"76.45969"}, {name:"Bus 2",lat:"10.599793",log:"76.460434"}, {name:"Bus 3",lat:"10.600112",log:"76.458180"}];
        $.each(buses, function(index, b) {
          const o = new BusLabel(new google.maps.LatLng(b.lat, b.log),b.name);
          o.setMap(map);
          labelOverlays.push(o);
        });        
      }
      map.addListener('center_changed', () => {
        const c = map.getCenter();
        circle.setCenter(c);
        refreshLabel();
        updateCoords(c);
      });

      updateCoords(map.getCenter());
    }
    window.initMap = initMap;
  </script>
  
{% endblock %}
